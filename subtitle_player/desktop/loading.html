<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<title>Subtitle Player</title>

<style>

  html, body {

    margin: 0; height: 100%;

    background: #ECE6D6; color: #6E6655;

    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;

    display: flex; flex-direction: column; align-items: center; justify-content: center;

    gap: 18px; user-select: none;

  }

  .logo { font-size: 44px; }

  .title { font-size: 17px; font-weight: 600; color: #3F3A30; letter-spacing: .5px; }

  .tip { font-size: 13px; color: #A89F8A; }

  .spinner {

    width: 30px; height: 30px; border-radius: 50%;

    border: 3px solid #D6CDB4; border-top-color: #2E7D6F;

    animation: spin .8s linear infinite;

  }

  @keyframes spin { to { transform: rotate(360deg); } }

</style>

</head>

<body>

  <div class="logo">🎬</div>

  <div class="title" id="loadingTitle">Subtitle Player</div>

  <div class="spinner"></div>

  <div class="tip" id="loadingTip">Starting local server, please wait…</div>

  <script>

    (function () {

      const zh = {

        loadingTitle: "字幕播放工具",

        loadingTip: "正在启动本地服务，请稍候…",

      };

      const en = {

        loadingTitle: "Subtitle Player",

        loadingTip: "Starting local server, please wait…",

      };

      let loc = "en";

      try {

        loc = localStorage.getItem("sp_locale") === "zh" ? "zh" : "en";

      } catch (_) { /* ignore */ }

      const s = loc === "zh" ? zh : en;

      document.documentElement.lang = loc === "zh" ? "zh-CN" : "en";

      document.getElementById("loadingTitle").textContent = s.loadingTitle;

      document.getElementById("loadingTip").textContent = s.loadingTip;

    })();

  </script>

</body>

</html>
